kind = "web"
previewPath = "/"
title = "O Tinh House"
version = "1.0.0"
id = "artifacts/o-tinh-house"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25203

[services.development]
run = "pnpm --filter @workspace/o-tinh-house run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/o-tinh-house", "run", "build" ]
publicDir = "artifacts/o-tinh-house/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25203"
BASE_PATH = "/"
